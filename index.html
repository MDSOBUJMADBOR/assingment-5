<!DOCTYPE html>
<html lang="en">

<head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">

          <!-- tailwind + daisyui CDN-->
          <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
          <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

          <!--Google font CDN -->
          <link rel="preconnect" href="https://fonts.googleapis.com">
          <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
          <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

          <style>
                    * {}

                    body {
                              font-family: "Geist", sans-serif;
                              background-color: #F2F2F2;


                    }
          </style>
          <title>Login</title>
</head>

<body>
          <div class=" h-[100vh] flex justify-center items-center">
                    <div class="h-[550px] w-[400px] bg-white rounded-md shadow-2xl p-6 ">
                              <div class="text-center space-y-3">
                                        <div class="flex justify-center items-center">
                                                  <img src="./assets/github-logo.png" alt="" class="">
                                        </div>
                                        <h2 class="font-bold text-2xl">GitHub Issues Tracker</h2>
                                        <p class="text-[#64748bFF]">Sign in to manage your issues</p>
                              </div><br>


                              <div class="space-y-3">
                                        <label class="">Username</label>
                                        <input id="userName" type="text" class="input w-full"
                                                  placeholder="Enter Username" />
                                        <p class="text-xs text-red-400">Default Username : admin</p>

                                        <label class="">Password</label>
                                        <input id="userPassword" type="password" class="input w-full"
                                                  placeholder="Enter Password" />
                                        <p class="text-xs text-red-400">Default Password : admin123</p>

                                        <button id="userButton" class="btn btn-primary mt-4 w-full">Login</button>
                              </div>
                    </div>

          </div>


          <script src="./index.js"></script>
</body>

</html>
