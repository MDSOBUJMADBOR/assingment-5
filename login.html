<!DOCTYPE html>
<html lang="en">

<head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">

          <!-- tailwind + daisyui CDN-->
          <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
          <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

          <!--Google font CDN -->
          <link rel="preconnect" href="https://fonts.googleapis.com">
          <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
          <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

          <style>
                    body {
                              font-family: "Geist", sans-serif;

                    }
          </style>
          <title>Login</title>
</head>

<body>
          <div class="max-w-lg shadow-lg mx-auto mt-14 rounded-sm">
                    <div class="p-8 flex justify-center items-center flex-col ">
                              <img src="./assets/github-logo.png" alt="" class=""><br>
                              <h2 class="font-bold text-2xl">GitHub Issues Tracker</h2>
                              <p class="text-[#64748bFF]">Sign in to manage your issues</p>
                    </div>
                    <div class="p-8 space-y-3">

                              <label class="">Username</label><br>
                              <input id="userName" type="text" class="input w-full" placeholder="Enter Username" />

                              <label class="">Password</label><br>
                              <input id="userPassword" type="password" class="input w-full" placeholder="Enter Password" />

                              <button id="userButton" class="btn btn-primary mt-4 w-full">Login</button>
                    </div>



          </div>


          <script src="./login.js"></script>
</body>

</html>
